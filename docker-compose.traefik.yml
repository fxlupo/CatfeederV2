services:
  backend:
    networks:
      - default
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.catfeeder-upload.rule=Host(`${UPLOAD_HOST}`) && PathRegexp(`^/api/devices/[^/]+/captures$`)
      - traefik.http.routers.catfeeder-upload.entrypoints=http
      - traefik.http.routers.catfeeder-upload.priority=20
      - traefik.http.services.catfeeder-backend.loadbalancer.server.port=3000

  frontend:
    networks:
      - default
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.catfeeder.rule=Host(`${PUBLIC_HOST}`)
      - traefik.http.routers.catfeeder.entrypoints=https
      - traefik.http.routers.catfeeder.tls=true
      - traefik.http.routers.catfeeder.tls.certresolver=${TRAEFIK_CERTRESOLVER:-http}
      - traefik.http.routers.catfeeder.priority=10
      - traefik.http.routers.catfeeder.middlewares=secHeaders@file
      - traefik.http.services.catfeeder.loadbalancer.server.port=80

networks:
  proxy:
    external: true
