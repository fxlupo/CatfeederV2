; CatFeeder ESP32-CAM Firmware
;
; Erstes Camera-Device fuer Iteration 4:
; - MQTT Status/Event
; - MQTT Capture Command
; - HTTP JPEG Upload ans Backend

[platformio]
default_envs = esp32cam

[env:esp32cam]
platform = espressif32
board = esp32cam
framework = arduino
upload_port = /dev/cu.wchusbserial110
monitor_port = /dev/cu.wchusbserial110
monitor_speed = 115200
upload_speed = 115200
board_build.partitions = default.csv
lib_deps =
	bblanchon/ArduinoJson@^7.3.0
	knolleary/PubSubClient@^2.8
build_flags =
	-DCORE_DEBUG_LEVEL=1
	-DBOARD_HAS_PSRAM=1

[env:esp32cam_ota]
extends = env:esp32cam
upload_protocol = espota
upload_port = catfeeder-cam.local
upload_flags = --timeout=120
